<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="900" xmlns="http://www.w3.org/2000/svg">
<defs>
    <style>
        .entity { fill: #e8f5e8; stroke: #2e7d2e; stroke-width: 2; }
        .core-entity { fill: #fff3cd; stroke: #856404; stroke-width: 3; }
        .entity-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
        .attribute-text { font-family: Arial, sans-serif; font-size: 10px; }
        .relationship { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
        .relationship-text { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
        .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
</defs>

<!-- Title -->
<text class="title" x="700" y="30" text-anchor="middle">CardDemo Application - Entity Relationship Diagram</text>
<rect class="core-entity" x="100" y="100" width="250" height="150" rx="8"/>
<text class="entity-text" x="225" y="125" text-anchor="middle">CUSTOMER</text>
<text class="attribute-text" x="108" y="150">CUST-ID</text>
<text class="attribute-text" x="108" y="165">CUST-FIRST-NAME</text>
<text class="attribute-text" x="108" y="180">CUST-MIDDLE-NAME</text>
<text class="attribute-text" x="108" y="195">CUST-ADDR-LINE-1</text>
<text class="attribute-text" x="108" y="210">CUST-ADDR-LINE-2</text>
<text class="attribute-text" x="108" y="225">CUST-ADDR-LINE-3</text>
<text class="attribute-text" x="108" y="240">... +10 more</text>
