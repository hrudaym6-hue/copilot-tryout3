<line class="relationship" x1="225" y1="175" x2="575" y2="175"/>
<text class="relationship-text" x="400" y="165" text-anchor="middle">1:N</text>
<line class="relationship" x1="575" y1="175" x2="925" y2="175"/>
<text class="relationship-text" x="750" y="165" text-anchor="middle">1:N</text>
<line class="relationship" x1="925" y1="175" x2="575" y2="425"/>
<text class="relationship-text" x="750" y="290" text-anchor="middle">1:N</text>
<line class="relationship" x1="925" y1="175" x2="925" y2="425"/>
